services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: centavo
      POSTGRES_PASSWORD: centavo
      POSTGRES_DB: centavo_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U centavo -d centavo_test"]
      interval: 3s
      timeout: 3s
      retries: 10

  # Unit & integration tests (no database needed — Prisma is mocked)
  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    command: pnpm test
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://centavo:centavo@postgres:5432/centavo_test

  # Coverage report
  coverage:
    build:
      context: .
      dockerfile: Dockerfile.test
    command: pnpm test:coverage
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://centavo:centavo@postgres:5432/centavo_test
    volumes:
      - ./coverage:/app/coverage
